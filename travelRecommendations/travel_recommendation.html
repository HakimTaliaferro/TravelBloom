<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>TravelBloom - Explore the World</title>

    <!-- <link rel="stylesheet" href="styles.css" /> -->
  </head>

  <body
    style="
      background-image: url('images/tropical.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    "
  >
    <!-- Navigation Bar -->
    <nav
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: rgba(49, 158, 213, 0.7);
        padding: 10px 0;
        z-index: 1000;
      "
    >
      <div class="logo" style="float: left; margin-left: 20px">
        <img src="logo.png" alt="TravelBloom Logo" />
      </div>
      <!-- Navigation Links -->
      <div class="nav-links" style="float: left; margin-left: 40px">
        <ul style="list-style: none; margin: 0; padding: 0">
          <li style="display: inline; margin-right: 20px">
            <a
              href="travel_recommendation.html"
              style="color: #fff; text-decoration: none"
              >Home</a
            >
          </li>
          <li style="display: inline; margin-right: 20px">
            <a href="about.html" style="color: #fff; text-decoration: none"
              >About Us</a
            >
          </li>
          <li style="display: inline; margin-right: 20px">
            <a href="contact.html" style="color: #fff; text-decoration: none"
              >Contact Us</a
            >
          </li>
        </ul>
      </div>

      <div class="search-container" style="float: right; margin-right: 20px">
        <input
          type="text"
          id="search-input"
          placeholder="Enter a destination or keyword"
          style="
            padding: 5px;
            border-radius: 20px;
            border: 1px solid #ccc;
            margin-right: 10px;
          "
        />
        <button
          id="search-btn"
          style="
            padding: 5px 10px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
          "
        >
          🔍
        </button>
        <button
          id="reset-btn"
          style="
            padding: 5px 10px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
          "
        >
          Reset
        </button>
        <button
          id="clear-btn"
          style="
            padding: 5px 10px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
          "
        >
          Clear
        </button>
      </div>
    </nav>

    <!-- Social Links -->
    <div class="social-links" style="margin-top: 80px; text-align: center">
      <ul style="list-style: none; padding: 0">
        <li style="display: inline; margin-right: 20px">
          <a href="https://bluesky.com" target="_blank">
            <img
              src="travelRecommendations/images/bluesky.png"
              alt="Bluesky Logo"
              style="width: 40px; height: 40px"
            />
          </a>
        </li>
        <li style="display: inline; margin-right: 20px">
          <a href="https://instagram.com" target="_blank">
            <img
              src="/images/instagram.png"
              alt="Instagram Logo"
              style="width: 40px; height: 40px"
            />
          </a>
        </li>
        <li style="display: inline">
          <a href="https://mastodon.social" target="_blank">
            <img
              src="/images/mastadon.png"
              alt="Mastodon Logo"
              style="width: 40px; height: 40px"
            />
          </a>
        </li>
      </ul>
    </div>

    <!-- Controlled space for JS text -->
    <h1
      style="
        padding-bottom: 30px;
        position: absolute;
        top: 40%;
        left: 20px;
        transform: translateY(-50%);
        font-size: 3rem; /* Larger font size */
        color: white;
        margin: 0;
      "
    >
      Welcome to TravelBloom!
    </h1>

    <div
      class="intro-text"
      style="
        position: absolute;
        top: 55%; /* Adjusted to create space below the h1 */
        left: 20px;
        transform: translateY(-50%);
        width: 800px;
        background: rgba(0, 0, 0, 0.3);
        padding: 30px;
        border-radius: 8px;
      "
    >
      <p
        id="introText"
        style="
          text-align: left;
          margin: 0;
          font-size: 1.2rem;
          line-height: 1.6;
          color: #fff;
          text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
        "
      ></p>
    </div>

    <!-- External JS file -->
    <script src="travel_recommendation.js"></script>
  </body>
</html>
